name: 构建主程序 APK

permissions:
  contents: write

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      app_version:
        description: "主程序大版本号 versionName，默认读取 app/build.gradle.kts"
        required: false
      app_version_code:
        description: "主程序小版本号 versionCode，默认读取 app/build.gradle.kts"
        required: false
      release_tag:
        description: "GitHub Release 标签，默认自动生成为 murong-agent-v<version>"
        required: false
      release_name:
        description: "Release 标题，默认 MurongAgent <version> (<code>)"
        required: false
      update_message:
        description: "更新摘要；为空时优先读取 release-notes/latest.md 里的“更新摘要：”首行"
        required: false
      changelog_path:
        description: "更新日志 Markdown 路径，默认 release-notes/latest.md"
        required: false
        default: "release-notes/latest.md"
      sync_to_server:
        description: "是否通过后端 API 上传主程序并回写后端版本信息"
        required: false
        default: true
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JAVA_VERSION: "26"
  GRADLE_VERSION: "9.6.1"
  ANDROID_API_LEVEL: "37"
  ANDROID_PLATFORM_PACKAGE: "platforms;android-37.0"
  ANDROID_BUILD_TOOLS_VERSION: "37.0.0"
  ANDROID_SDK_CHANNEL: "3"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sanitize Gradle Properties For Linux CI
        shell: bash
        run: |
          set -euo pipefail
          # The repository keeps a Windows-only local JDK path for on-device development.
          # GitHub Actions runs on Linux, so this path must not be present in CI.
          python3 - <<'PY'
          from pathlib import Path
          path = Path("gradle.properties")
          text = path.read_text(encoding="utf-8")
          lines = [line for line in text.splitlines() if not line.startswith("org.gradle.java.home=")]
          path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Set Up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          check-latest: true

      - name: Set Up Gradle ${{ env.GRADLE_VERSION }}
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-cleanup: never

      - name: Set Up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android Packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager --channel="${ANDROID_SDK_CHANNEL}" --install \
            "platform-tools" \
            "${ANDROID_PLATFORM_PACKAGE}" \
            "build-tools;${ANDROID_BUILD_TOOLS_VERSION}"

      - name: Prepare Release Metadata
        shell: bash
        env:
          INPUT_APP_VERSION: ${{ github.event.inputs.app_version }}
          INPUT_APP_VERSION_CODE: ${{ github.event.inputs.app_version_code }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          INPUT_RELEASE_NAME: ${{ github.event.inputs.release_name }}
          INPUT_UPDATE_MESSAGE: ${{ github.event.inputs.update_message }}
          INPUT_CHANGELOG_PATH: ${{ github.event.inputs.changelog_path }}
        run: |
          set -euo pipefail

          read_gradle_default() {
            local key="$1"
            python3 -c 'import pathlib,re,sys; key=sys.argv[1]; text=pathlib.Path("app/build.gradle.kts").read_text(encoding="utf-8"); patterns={"versionName":[r"versionName\s*=\s*\"([^\"]+)\"", r"val\s+appVersionName\s*=.*?\?:\s*\"([^\"]+)\""], "versionCode":[r"versionCode\s*=\s*([0-9]+)", r"val\s+appVersionCode\s*=.*?\?:\s*([0-9]+)"]}; match=next((m for pattern in patterns[key] for m in [re.search(pattern, text, re.S)] if m), None); print(match.group(1)) if match else (print(f"Failed to read default {key}", file=sys.stderr), sys.exit(1))' "${key}"
          }

          DEFAULT_APP_VERSION="$(read_gradle_default versionName)"
          DEFAULT_APP_VERSION_CODE="$(read_gradle_default versionCode)"

          APP_VERSION="${INPUT_APP_VERSION:-${DEFAULT_APP_VERSION}}"
          APP_VERSION_CODE="${INPUT_APP_VERSION_CODE:-${DEFAULT_APP_VERSION_CODE}}"

          if [[ -z "${APP_VERSION}" || -z "${APP_VERSION_CODE}" ]]; then
            echo "Missing APK version metadata."
            exit 1
          fi

          if [[ ! "${APP_VERSION_CODE}" =~ ^[0-9]+$ ]]; then
            echo "Invalid app versionCode: ${APP_VERSION_CODE}" >&2
            exit 1
          fi

          RELEASE_TAG="${INPUT_RELEASE_TAG:-murong-agent-v${APP_VERSION}}"
          RELEASE_NAME="${INPUT_RELEASE_NAME:-MurongAgent ${APP_VERSION} (${APP_VERSION_CODE})}"
          ARTIFACT_BASENAME="murongagent-${APP_VERSION}-${APP_VERSION_CODE}"
          APK_FILE="${ARTIFACT_BASENAME}.apk"
          CHANGELOG_PATH="${INPUT_CHANGELOG_PATH:-release-notes/latest.md}"
          export APP_VERSION RELEASE_NAME CHANGELOG_PATH INPUT_UPDATE_MESSAGE

          {
            echo "APP_VERSION=${APP_VERSION}"
            echo "APP_VERSION_CODE=${APP_VERSION_CODE}"
            echo "RELEASE_TAG=${RELEASE_TAG}"
            echo "RELEASE_NAME=${RELEASE_NAME}"
            echo "ARTIFACT_BASENAME=${ARTIFACT_BASENAME}"
            echo "APK_FILE=${APK_FILE}"
            echo "CHANGELOG_PATH=${CHANGELOG_PATH}"
          } >> "${GITHUB_ENV}"

          python3 - <<'PY'
          import os
          from pathlib import Path

          changelog_path = Path(os.environ.get("CHANGELOG_PATH", "release-notes/latest.md"))
          raw_text = ""
          if changelog_path.is_file():
              raw_text = changelog_path.read_text(encoding="utf-8").replace("\r\n", "\n").strip()

          lines = raw_text.splitlines()
          summary_prefixes = ("更新摘要：", "更新摘要:", "Summary:", "SUMMARY:")
          summary = os.environ.get("INPUT_UPDATE_MESSAGE", "").strip()
          if not summary:
              for index, line in enumerate(lines):
                  stripped = line.strip()
                  if not stripped:
                      continue
                  matched_prefix = next((prefix for prefix in summary_prefixes if stripped.startswith(prefix)), None)
                  if matched_prefix is not None:
                      summary = stripped[len(matched_prefix):].strip()
                      lines = lines[index + 1 :]
                      while lines and not lines[0].strip():
                          lines.pop(0)
                      break

          if not summary:
              summary = f"发现新版本 {os.environ['APP_VERSION']}，前往下载页安装即可。"

          changelog = "\n".join(lines).strip() or raw_text or f"{os.environ['RELEASE_NAME']}\n"
          env_path = Path(os.environ["GITHUB_ENV"])
          with env_path.open("a", encoding="utf-8") as handle:
              handle.write(f"RELEASE_UPDATE_MESSAGE={summary}\n")
              handle.write("RELEASE_CHANGELOG<<EOF\n")
              handle.write(changelog)
              handle.write("\nEOF\n")
          PY

      - name: Build Release APK
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew --no-daemon \
            :app:assembleRelease \
            -PAPP_VERSION_NAME="${APP_VERSION}" \
            -PAPP_VERSION_CODE="${APP_VERSION_CODE}" \
            -PSTORE_PASSWORD="${{ secrets.STORE_PASSWORD }}" \
            -PKEY_PASSWORD="${{ secrets.KEY_PASSWORD }}" \
            -PKEYSTORE_BASE64="${{ secrets.KEYSTORE_BASE64 }}"

      - name: Rename Release Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp app/build/outputs/apk/release/*.apk "dist/${APK_FILE}"

      - name: Collect Release Artifact Metadata
        shell: bash
        run: |
          set -euo pipefail
          APK_SHA256="$(sha256sum "dist/${APK_FILE}" | awk '{print $1}')"
          APK_SIZE_BYTES="$(stat -c%s "dist/${APK_FILE}")"
          {
            echo "APK_SHA256=${APK_SHA256}"
            echo "APK_SIZE_BYTES=${APK_SIZE_BYTES}"
          } >> "${GITHUB_ENV}"

      - name: Upload APK
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_BASENAME }}
          path: dist/${{ env.APK_FILE }}
          retention-days: 1

      - name: Publish GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: dist/${{ env.APK_FILE }}
          body: ${{ env.RELEASE_CHANGELOG }}
          makeLatest: true
          name: ${{ env.RELEASE_NAME }}
          removeArtifacts: true
          replacesArtifacts: true
          tag: ${{ env.RELEASE_TAG }}

      - name: Upload APK To Murong Backend
        if: github.event_name == 'workflow_dispatch' && inputs.sync_to_server
        shell: bash
        env:
          RELEASES_API_URL: https://murongagent.rl1.cc/api/releases.php
          RELEASES_ADMIN_TOKEN: ${{ secrets.MURONG_AGENT_RELEASES_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${RELEASES_ADMIN_TOKEN:-}" ]]; then
            echo "Missing secret: MURONG_AGENT_RELEASES_ADMIN_TOKEN" >&2
            exit 1
          fi
          RESPONSE_FILE="$(mktemp)"
          HTTP_STATUS="$(curl --silent --show-error \
            --output "${RESPONSE_FILE}" \
            --write-out "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${RELEASES_ADMIN_TOKEN}" \
            -H "Accept: application/json" \
            -F "token=${RELEASES_ADMIN_TOKEN}" \
            -F "artifact=murongagent-app" \
            -F "apk_file=@dist/${APK_FILE};type=application/vnd.android.package-archive" \
            -F "target_name=${APK_FILE}" \
            -F "version=${APP_VERSION}" \
            -F "version_code=${APP_VERSION_CODE}" \
            "${RELEASES_API_URL}?action=upload")"
          RESPONSE="$(cat "${RESPONSE_FILE}")"
          rm -f "${RESPONSE_FILE}"
          if [[ "${HTTP_STATUS}" != "200" && "${HTTP_STATUS}" != "201" ]]; then
            echo "Backend upload failed with HTTP ${HTTP_STATUS}" >&2
            echo "${RESPONSE}" >&2
            exit 1
          fi
          UPLOAD_RESPONSE="${RESPONSE}" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          response = json.loads(os.environ["UPLOAD_RESPONSE"])
          if not response.get("success"):
              raise SystemExit(response.get("message", "upload failed"))
          data = response.get("data") or {}
          download_url = data.get("downloadUrl", "").strip()
          if not download_url:
              raise SystemExit("upload response missing downloadUrl")
          env_path = Path(os.environ["GITHUB_ENV"])
          with env_path.open("a", encoding="utf-8") as handle:
              handle.write(f"DOWNLOAD_URL={download_url}\n")
              if data.get("fileName"):
                  handle.write(f"APK_FILE={data['fileName']}\n")
              if data.get("checksumSha256"):
                  handle.write(f"APK_SHA256={data['checksumSha256']}\n")
              if data.get("fileSize") is not None:
                  handle.write(f"APK_SIZE_BYTES={int(data['fileSize'])}\n")
          PY

      - name: Publish Release Metadata To Murong Backend
        if: github.event_name == 'workflow_dispatch' && inputs.sync_to_server
        shell: bash
        env:
          RELEASES_API_URL: https://murongagent.rl1.cc/api/releases.php
          RELEASES_ADMIN_TOKEN: ${{ secrets.MURONG_AGENT_RELEASES_ADMIN_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${RELEASES_ADMIN_TOKEN}" ]]; then
            echo "Missing secret: MURONG_AGENT_RELEASES_ADMIN_TOKEN" >&2
            exit 1
          fi

          PAYLOAD="$(python3 - <<'PY'
          import json
          import os

          print(json.dumps({
              "token": os.environ["RELEASES_ADMIN_TOKEN"],
              "artifactKey": "murongagent-app",
              "channel": "stable",
              "versionName": os.environ["APP_VERSION"],
              "versionCode": int(os.environ["APP_VERSION_CODE"]),
              "fileName": os.environ["APK_FILE"],
              "downloadUrl": os.environ["DOWNLOAD_URL"],
              "checksumSha256": os.environ["APK_SHA256"],
              "changelog": os.environ["RELEASE_CHANGELOG"],
              "updateMessage": os.environ["RELEASE_UPDATE_MESSAGE"],
              "fileSize": int(os.environ["APK_SIZE_BYTES"]),
              "status": "active"
          }, ensure_ascii=False))
          PY
          )"

          RESPONSE_FILE="$(mktemp)"
          HTTP_STATUS="$(curl --silent --show-error \
            --output "${RESPONSE_FILE}" \
            --write-out "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${RELEASES_ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            --data "${PAYLOAD}" \
            "${RELEASES_API_URL}?action=create")"
          RESPONSE="$(cat "${RESPONSE_FILE}")"
          rm -f "${RESPONSE_FILE}"
          if [[ "${HTTP_STATUS}" != "200" && "${HTTP_STATUS}" != "201" ]]; then
            echo "Backend metadata publish failed with HTTP ${HTTP_STATUS}" >&2
            echo "${RESPONSE}" >&2
            exit 1
          fi
