name: Build APK

permissions:
  contents: write

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      app_version:
        description: "APK 大版本号 versionName，默认读取 app/build.gradle.kts"
        required: false
      app_version_code:
        description: "APK 小版本号 versionCode，默认读取 app/build.gradle.kts"
        required: false
      release_tag:
        description: "GitHub Release 标签，默认固定标签 reasonix-mobile"
        required: false
      release_name:
        description: "Release 标题，默认 Reasonix Mobile APK"
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set Up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set Up Gradle 8.13
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.13"
          cache-cleanup: never

      - name: Set Up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android Packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "cmake;3.22.1" \
            "ndk;27.3.13750724"

      - name: Prepare Release Metadata
        shell: bash
        env:
          INPUT_APP_VERSION: ${{ github.event.inputs.app_version }}
          INPUT_APP_VERSION_CODE: ${{ github.event.inputs.app_version_code }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          INPUT_RELEASE_NAME: ${{ github.event.inputs.release_name }}
        run: |
          set -euo pipefail

          read_gradle_default() {
            local key="$1"
            python3 -c 'import pathlib,re,sys; key=sys.argv[1]; text=pathlib.Path("app/build.gradle.kts").read_text(encoding="utf-8"); patterns={"versionName":[r"versionName\s*=\s*\"([^\"]+)\"", r"val\s+appVersionName\s*=.*?\?:\s*\"([^\"]+)\""], "versionCode":[r"versionCode\s*=\s*([0-9]+)", r"val\s+appVersionCode\s*=.*?\?:\s*([0-9]+)"]}; match=next((m for pattern in patterns[key] for m in [re.search(pattern, text, re.S)] if m), None); print(match.group(1)) if match else (print(f"Failed to read default {key}", file=sys.stderr), sys.exit(1))' "${key}"
          }

          DEFAULT_APP_VERSION="$(read_gradle_default versionName)"
          DEFAULT_APP_VERSION_CODE="$(read_gradle_default versionCode)"

          APP_VERSION="${INPUT_APP_VERSION:-${DEFAULT_APP_VERSION}}"
          APP_VERSION_CODE="${INPUT_APP_VERSION_CODE:-${DEFAULT_APP_VERSION_CODE}}"

          if [[ -z "${APP_VERSION}" || -z "${APP_VERSION_CODE}" ]]; then
            echo "Missing APK version metadata."
            exit 1
          fi

          if [[ ! "${APP_VERSION_CODE}" =~ ^[0-9]+$ ]]; then
            echo "Invalid app versionCode: ${APP_VERSION_CODE}" >&2
            exit 1
          fi

          RELEASE_TAG="${INPUT_RELEASE_TAG:-reasonix-mobile}"
          RELEASE_NAME="${INPUT_RELEASE_NAME:-Reasonix Mobile APK}"
          APK_FILE="ReasonixMobile-${APP_VERSION}.apk"

          {
            echo "APP_VERSION=${APP_VERSION}"
            echo "APP_VERSION_CODE=${APP_VERSION_CODE}"
            echo "RELEASE_TAG=${RELEASE_TAG}"
            echo "RELEASE_NAME=${RELEASE_NAME}"
            echo "APK_FILE=${APK_FILE}"
          } >> "${GITHUB_ENV}"

      - name: Build Release APK
        shell: bash
        run: |
          set -euo pipefail
          gradle --no-daemon \
            :app:assembleRelease \
            -PAPP_VERSION_NAME="${APP_VERSION}" \
            -PAPP_VERSION_CODE="${APP_VERSION_CODE}" \
            -PSTORE_PASSWORD="${{ secrets.STORE_PASSWORD }}" \
            -PKEY_PASSWORD="${{ secrets.KEY_PASSWORD }}" \
            -PKEYSTORE_BASE64="${{ secrets.KEYSTORE_BASE64 }}"

      - name: Rename Release Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp app/build/outputs/apk/release/*.apk "dist/${APK_FILE}"

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: reasonix-mobile-apk
          path: dist/${{ env.APK_FILE }}

      - name: Publish GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: dist/${{ env.APK_FILE }}
          makeLatest: true
          name: ${{ env.RELEASE_NAME }}
          removeArtifacts: true
          replacesArtifacts: true
          tag: ${{ env.RELEASE_TAG }}
