name: Deploy Agent Go Relay

on:
  workflow_dispatch:
    inputs:
      candidate_release_tag:
        description: "MurongAgent Release tag containing the verified Relay deploy package"
        required: true
        default: "agent-relay-candidate"
      nginx_vhost_path:
        description: "Absolute Nginx vhost path on the Agent server"
        required: true
        default: "/www/server/panel/vhost/nginx/murongagent.rl1.cc.conf"
      confirmation:
        description: "Type DEPLOY MURONG RELAY"
        required: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELAY_URL: "wss://murongagent.rl1.cc/relay/v1/connect"

jobs:
  deploy:
    runs-on: ubuntu-24.04
    environment: murongagent-production
    steps:
      - name: Require explicit production confirmation
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
          NGINX_VHOST_PATH: ${{ inputs.nginx_vhost_path }}
          CANDIDATE_RELEASE_TAG: ${{ inputs.candidate_release_tag }}
        run: |
          set -euo pipefail
          [[ "${CONFIRMATION}" == "DEPLOY MURONG RELAY" ]] || { echo "Confirmation text does not match" >&2; exit 1; }
          [[ "${NGINX_VHOST_PATH}" =~ ^/[A-Za-z0-9._/-]+$ ]] || { echo "Unsafe Nginx vhost path" >&2; exit 1; }
          [[ "${NGINX_VHOST_PATH}" != *"/../"* && "${NGINX_VHOST_PATH}" == */murongagent.rl1.cc.conf ]] || { echo "Nginx vhost must be the Murong Agent site" >&2; exit 1; }
          [[ "${CANDIDATE_RELEASE_TAG}" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$ ]] || { echo "Unsafe candidate Release tag" >&2; exit 1; }

      - name: Download and verify Relay candidate
        env:
          GH_TOKEN: ${{ github.token }}
          CANDIDATE_RELEASE_TAG: ${{ inputs.candidate_release_tag }}
        run: |
          set -euo pipefail
          mkdir -p candidate package
          gh release download "${CANDIDATE_RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir candidate \
            --pattern murongagent-relay-deploy.tar.gz \
            --pattern murongagent-relay-deploy.tar.gz.sha256
          (cd candidate && sha256sum -c murongagent-relay-deploy.tar.gz.sha256)
          tar -C package -xzf candidate/murongagent-relay-deploy.tar.gz
          (cd package && sha256sum -c SHA256SUMS.txt)
          jq -e '
            .sourceRepository == "murongruyan/murongagent-backend" and
            .relayProtocol == "murong-cloud-relay-v1" and
            (.sourceCommit | test("^[0-9a-f]{40}$"))
          ' package/manifest.json >/dev/null
          chmod 0700 package/murongagent-api-* package/relay-smoke-* package/install-linux.sh

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.MURONG_AGENT_DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.MURONG_AGENT_DEPLOY_PORT }}
          DEPLOY_USERNAME: ${{ secrets.MURONG_AGENT_DEPLOY_USERNAME }}
          DEPLOY_KEY: ${{ secrets.MURONG_AGENT_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          for value in DEPLOY_HOST DEPLOY_PORT DEPLOY_USERNAME DEPLOY_KEY; do
            [[ -n "${!value:-}" ]] || { echo "Missing secret: ${value}" >&2; exit 1; }
          done
          [[ "${DEPLOY_HOST}" =~ ^[A-Za-z0-9.-]+$ ]] || { echo "Unsafe deploy host" >&2; exit 1; }
          [[ "${DEPLOY_PORT}" =~ ^[0-9]{1,5}$ ]] && (( DEPLOY_PORT >= 1 && DEPLOY_PORT <= 65535 )) || { echo "Invalid deploy port" >&2; exit 1; }
          [[ "${DEPLOY_USERNAME}" =~ ^[A-Za-z0-9._-]+$ ]] || { echo "Unsafe deploy username" >&2; exit 1; }
          install -d -m 0700 ~/.ssh
          printf '%s' "${DEPLOY_KEY}" > ~/.ssh/id_ed25519
          chmod 0600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Preflight server and deploy with rollback
        env:
          DEPLOY_HOST: ${{ secrets.MURONG_AGENT_DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.MURONG_AGENT_DEPLOY_PORT }}
          DEPLOY_USERNAME: ${{ secrets.MURONG_AGENT_DEPLOY_USERNAME }}
          NGINX_VHOST_PATH: ${{ inputs.nginx_vhost_path }}
        run: |
          set -euo pipefail
          remote="${DEPLOY_USERNAME}@${DEPLOY_HOST}"
          ssh_args=(-i ~/.ssh/id_ed25519 -p "${DEPLOY_PORT}" -o BatchMode=yes -o StrictHostKeyChecking=yes)
          remote_arch="$(ssh "${ssh_args[@]}" "${remote}" 'uname -m')"
          case "${remote_arch}" in
            x86_64|amd64) binary="package/murongagent-api-amd64"; smoke="package/relay-smoke-amd64" ;;
            aarch64|arm64) binary="package/murongagent-api-arm64"; smoke="package/relay-smoke-arm64" ;;
            *) echo "Unsupported server architecture: ${remote_arch}" >&2; exit 1 ;;
          esac
          ssh "${ssh_args[@]}" "${remote}" "sudo -n true && test -f '${NGINX_VHOST_PATH}' && command -v nginx >/dev/null && command -v systemctl >/dev/null"
          stage="/tmp/murongagent-relay-${GITHUB_RUN_ID}"
          ssh "${ssh_args[@]}" "${remote}" "install -d -m 0700 '${stage}'"
          cleanup() {
            ssh "${ssh_args[@]}" "${remote}" "rm -rf '${stage}'" || true
          }
          trap cleanup EXIT
          scp -i ~/.ssh/id_ed25519 -P "${DEPLOY_PORT}" \
            "${binary}" \
            "${smoke}" \
            package/env.production.template \
            package/murongagent-backend-go.service \
            package/nginx-go-relay.conf \
            package/install-linux.sh \
            "${remote}:${stage}/"
          ssh "${ssh_args[@]}" "${remote}" "chmod 0700 '${stage}/install-linux.sh' && sudo -n env \
            MURONG_BINARY_SOURCE='${stage}/$(basename "${binary}")' \
            MURONG_SMOKE_SOURCE='${stage}/$(basename "${smoke}")' \
            MURONG_SERVICE_SOURCE='${stage}/murongagent-backend-go.service' \
            MURONG_NGINX_SNIPPET_SOURCE='${stage}/nginx-go-relay.conf' \
            MURONG_ENV_TEMPLATE_SOURCE='${stage}/env.production.template' \
            MURONG_NGINX_VHOST_PATH='${NGINX_VHOST_PATH}' \
            bash '${stage}/install-linux.sh'"
          trap - EXIT
          cleanup

      - name: Verify public health and WebSocket round trip
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 20 https://murongagent.rl1.cc/relay/healthz | tee /tmp/murong-relay-health.json
          ./package/relay-smoke-amd64 -url "${RELAY_URL}" -timeout 30s
